server {
    listen 80;
    server_name plotra.eu www.plotra.eu dev.plotra.eu;
    return 301 https://$host$request_uri;
}

# plotra.eu — Landing page
server {
    listen 443 ssl;
    http2 on;
    server_name plotra.eu www.plotra.eu;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location / {
        proxy_pass http://dashboard:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# dev.plotra.eu — Dashboard app + API
server {
    listen 443 ssl;
    http2 on;
    server_name dev.plotra.eu;

    ssl_certificate /etc/nginx/ssl/dev-fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/dev-privkey.pem;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://dashboard:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
