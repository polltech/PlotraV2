services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: plotra-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plotra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plotrav2_plotra_network

  backend:
    build: ./backend
    container_name: plotra-backend
    environment:
      PLOTRA_DATABASE__HOST: postgres
      PLOTRA_DATABASE__PORT: 5432
      PLOTRA_DATABASE__USERNAME: postgres
      PLOTRA_DATABASE__PASSWORD: postgres
      PLOTRA_DATABASE__NAME: plotra_db
      PLOTRA_APP__DEBUG: "false"
      PLOTRA_APP__SECRET_KEY: your-super-secret-key-change-this-in-production
      UVICORN_WORKERS: 2
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - plotrav2_plotra_network
    command: sh -c "sleep 10 && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

  dashboard:
    build: ./frontend/dashboard
    container_name: plotra-dashboard
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - plotrav2_plotra_network

  nginx-proxy:
    image: nginx:alpine
    container_name: plotra-nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /root/ssl-certs:/etc/nginx/ssl:ro
    depends_on:
      - dashboard
      - backend
    restart: unless-stopped
    networks:
      - plotrav2_plotra_network

volumes:
  postgres_data:
  uploads_data:

networks:
  plotrav2_plotra_network:
    external: true

