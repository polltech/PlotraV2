# Production overrides for Digital Ocean — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Copy .env.example → .env and fill in secrets
#   2. Set domain in PLOTRA_APP__FRONTEND_BASE_URL and PLOTRA_CORS__ALLOWED_ORIGINS

services:
  postgres:
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-plotra_db}
    restart: always

  backend:
    env_file:
      - path: .env
        required: true
    environment:
      # Application
      - PLOTRA_APP__SECRET_KEY=${PLOTRA_APP__SECRET_KEY}
      - PLOTRA_APP__DEBUG=false
      - PLOTRA_APP__ACCESS_TOKEN_EXPIRE_MINUTES=${PLOTRA_APP__ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - PLOTRA_APP__FRONTEND_BASE_URL=${PLOTRA_APP__FRONTEND_BASE_URL}
      # Database (from env_file takes precedence, these are fallbacks)
      - PLOTRA_DATABASE__HOST=postgres
      - PLOTRA_DATABASE__PORT=5432
      - PLOTRA_DATABASE__USERNAME=${POSTGRES_USER:-postgres}
      - PLOTRA_DATABASE__PASSWORD=${POSTGRES_PASSWORD}
      - PLOTRA_DATABASE__NAME=${POSTGRES_DB:-plotra_db}
      - PLOTRA_DATABASE__ASYNC_MODE=true
      # PostGIS
      - PLOTRA_POSTGIS__ENABLED=true
      - PLOTRA_POSTGIS__SRID=4326
      # Geospatial
      - PLOTRA_GEOSPATIAL__GPS_ACCURACY_THRESHOLD_METERS=10
      - PLOTRA_GEOSPATIAL__MIN_POLYGON_AREA_HECTARES=0.1
      - PLOTRA_GEOSPATIAL__MAX_FARM_POLYGONS_PER_FARMER=10
      - PLOTRA_GEOSPATIAL__PARENT_CHILD_VALIDATION=true
      - PLOTRA_GEOSPATIAL__BOUNDARY_OVERLAP_TOLERANCE=0.01
      # Satellite
      - PLOTRA_SATELLITE__API_KEY=${PLOTRA_SATELLITE__API_KEY:-}
      - PLOTRA_SATELLITE__SIMULATION_MODE=${PLOTRA_SATELLITE__SIMULATION_MODE:-true}
      - PLOTRA_SATELLITE__NDVI_THRESHOLD=0.65
      - PLOTRA_SATELLITE__DEFORESTATION_BASELINE_YEAR=2014
      - PLOTRA_SATELLITE__BIOMASS_THRESHOLD=100.0
      # EUDR
      - PLOTRA_EUDR__COMPLIANCE_STATUS=Under Review
      - PLOTRA_EUDR__CERTIFICATE_VALIDITY_DAYS=365
      - PLOTRA_EUDR__DDS_VERSION=1.0
      - PLOTRA_EUDR__PORTAL_URL=${PLOTRA_EUDR__PORTAL_URL:-}
      # Email
      - PLOTRA_EMAIL__SMTP_SERVER=${PLOTRA_EMAIL__SMTP_SERVER:-}
      - PLOTRA_EMAIL__SMTP_PORT=${PLOTRA_EMAIL__SMTP_PORT:-587}
      - PLOTRA_EMAIL__SMTP_USERNAME=${PLOTRA_EMAIL__SMTP_USERNAME:-}
      - PLOTRA_EMAIL__SMTP_PASSWORD=${PLOTRA_EMAIL__SMTP_PASSWORD:-}
      - PLOTRA_EMAIL__FROM_EMAIL=${PLOTRA_EMAIL__FROM_EMAIL:-}
      - PLOTRA_EMAIL__FROM_NAME=Plotra Platform
      - PLOTRA_EMAIL__USE_TLS=true
      # Auth
      - PLOTRA_AUTH__MAX_LOGIN_ATTEMPTS=5
      - PLOTRA_AUTH__LOCKOUT_DURATION_MINUTES=15
      - PLOTRA_AUTH__PASSWORD_RESET_TOKEN_EXPIRY_HOURS=24
      # CORS
      - PLOTRA_CORS__ALLOWED_ORIGINS=${PLOTRA_CORS__ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      # Storage
      - PLOTRA_STORAGE__S3_BUCKET=${PLOTRA_STORAGE__S3_BUCKET:-}
      - PLOTRA_STORAGE__S3_ENDPOINT=${PLOTRA_STORAGE__S3_ENDPOINT:-}
      - PLOTRA_STORAGE__S3_ACCESS_KEY=${PLOTRA_STORAGE__S3_ACCESS_KEY:-}
      - PLOTRA_STORAGE__S3_SECRET_KEY=${PLOTRA_STORAGE__S3_SECRET_KEY:-}
      - PLOTRA_STORAGE__S3_REGION=${PLOTRA_STORAGE__S3_REGION:-af-south-1}
      # Payments
      - PLOTRA_PAYMENTS__ENABLED=${PLOTRA_PAYMENTS__ENABLED:-false}
      - PLOTRA_PAYMENTS__MPESA_CONSUMER_KEY=${PLOTRA_PAYMENTS__MPESA_CONSUMER_KEY:-}
      - PLOTRA_PAYMENTS__MPESA_CONSUMER_SECRET=${PLOTRA_PAYMENTS__MPESA_CONSUMER_SECRET:-}
      - PLOTRA_PAYMENTS__MPESA_SHORTCODE=${PLOTRA_PAYMENTS__MPESA_SHORTCODE:-}
      - PLOTRA_PAYMENTS__ESCROW_ENABLED=true
      # Verification
      - PLOTRA_VERIFICATION__REQUIRE_ALL_FIELDS=false
      - PLOTRA_VERIFICATION__AUTO_SUBMIT_EUDR=false
      - PLOTRA_VERIFICATION__ALERT_THRESHOLD_DAYS=30
      # Logging
      - PLOTRA_LOGGING__LEVEL=INFO
      - PLOTRA_LOGGING__AUDIT_ENABLED=true
      # Workers
      - UVICORN_WORKERS=${UVICORN_WORKERS:-2}
      - PYTHONPATH=/app
    command: >
      sh -c "python -m uvicorn app.main:app
             --host 0.0.0.0
             --port 8000
             --workers ${UVICORN_WORKERS:-2}
             --proxy-headers
             --forwarded-allow-ips='*'"
    restart: always

  dashboard:
    environment:
      - NGINX_HOST=${NGINX_HOST:-localhost}
      - NGINX_PORT=80
    restart: always
